# Airacer Car Model - Frost (冰霜白极光车) - Inherits TeslaModel3

EXTERNPROTO "https://raw.githubusercontent.com/cyberbotics/webots/R2025a/projects/vehicles/protos/tesla/TeslaModel3.proto"

PROTO CarFrost [
  field SFString name "car_frost"
  field SFVec3f translation 0 0 0.4
  field SFRotation rotation 0 0 1 0
  field SFString controller "car"
]
{
  TeslaModel3 {
    translation IS translation
    rotation IS rotation
    controller IS controller
    name IS name
    color 0.9490 0.9490 0.9686
    sensorsSlotFront [
    Pose {
      translation 0 0 1.5
      children [
        Camera {
          translation 0.06 0.08 0.25
          rotation 0 1 0 0.2
          name "right_camera"
          fieldOfView 1.047
          width 640
          height 480
          far 100
        }
        Camera {
          translation -0.06 0.08 0.25
          rotation 0 1 0 0.2
          name "left_camera"
          fieldOfView 1.047
          width 640
          height 480
          far 100
        }
      ]
    }
  ]
  }
}
