      Transform {
        translation -0.3 -0.71 0.25
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.6 0.75 0.85
              roughness 0.05
              metalness 0.1
              transparency 0.3
            }
            geometry Box {
              size 1.8 0.02 0.28
            }
          }
        ]
      }

      # Side windows (right)
      Transform {
        translation -0.3 0.71 0.25
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.6 0.75 0.85
              roughness 0.05
              metalness 0.1
              transparency 0.3
