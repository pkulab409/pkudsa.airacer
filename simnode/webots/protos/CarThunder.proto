# Airacer Car Model - Thunder (电光蓝肌肉车) - Enhanced Version

PROTO CarThunder [
  field SFString name "car_thunder"
  field SFVec3f translation 0 0 0.302
  field SFRotation rotation 0 0 1 0
  field SFString controller "car"
  field SFString customData ""
  field SFVec3f bodySize 4.2 1.8 0.12
  field SFFloat mass 800.0
  field SFColor bodyColor 0.12 0.56 1.0  # 电光蓝 #1E90FF
]
{
  Robot {
    name IS name
    translation IS translation
    rotation IS rotation
    controller IS controller
    customData IS customData

    children [
      # Main body - wide muscle car
      Transform {
        translation 0 0 0
        children [
          Shape {
            appearance PBRAppearance {
              baseColor IS bodyColor
              roughness 0.4
              metalness 0.3
            }
            geometry Box {
              size IS bodySize
            }
          }
        ]
      }

      # Upper body - cabin
      Transform {
        translation -0.3 0 0.25
        children [
          Shape {
            appearance PBRAppearance {
              baseColor IS bodyColor
              roughness 0.4
              metalness 0.3
            }
            geometry Box {
              size 2.2 1.4 0.35
            }
          }
        ]
      }

      # Wide fenders - front left
      Transform {
        translation 1.5 -0.95 0
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.12 0.56 1.0
              roughness 0.4
              metalness 0.3
            }
            geometry Box {
              size 0.8 0.2 0.1
            }
          }
        ]
      }

      # Wide fenders - front right
      Transform {
        translation 1.5 0.95 0
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.12 0.56 1.0
