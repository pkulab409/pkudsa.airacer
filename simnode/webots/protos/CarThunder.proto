            }
          }
        ]
      }

      # Headlights (ice blue) - left
      Transform {
        translation 2.05 -0.55 0.01
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.8 0.9 1.0
              emissiveColor 0.7 0.85 1.0
              roughness 0.1
              metalness 0.0
            }
            geometry Box {
              size 0.12 0.2 0.03
            }
          }
        ]
