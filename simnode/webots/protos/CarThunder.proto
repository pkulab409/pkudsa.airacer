              metalness 0.3
            }
            geometry Box {
              size 0.8 0.2 0.1
            }
          }
        ]
      }

      # Front hood (muscle car style)
      Transform {
        translation 1.2 0 0.12
        children [
          Shape {
            appearance PBRAppearance {
              baseColor IS bodyColor
              roughness 0.4
              metalness 0.3
            }
            geometry Box {
              size 1.2 1.6 0.08
            }
          }
        ]
      }

      # Windshield (front)
      Transform {
        translation 0.4 0 0.35
        rotation 0 1 0 -0.4
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.6 0.75 0.85
              roughness 0.05
              metalness 0.1
              transparency 0.3
            }
            geometry Box {
              size 0.15 1.2 0.4
            }
          }
        ]
      }

      # Rear window
      Transform {
        translation -1.0 0 0.35
        rotation 0 1 0 0.5
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.6 0.75 0.85
              roughness 0.05
              metalness 0.1
