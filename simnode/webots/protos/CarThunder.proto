      # Camera - right side
      Camera {
        name "right_camera"
        translation 2.1 0.3 0.08
        rotation 0 0 1 0.1
        width 640
        height 480
        fieldOfView 1.047
      }

      # InertialUnit
      InertialUnit {
        name "imu"
        translation 0 0 0
      }
    ]

    boundingObject Box {
      size IS bodySize
    }

    physics Physics {
      density -1
      mass IS mass
      centerOfMass [ 0 0 -0.02 ]
    }
  }
}
