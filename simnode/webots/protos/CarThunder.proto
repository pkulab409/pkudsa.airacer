      }

      # Wheels - larger appearance
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 0 1 0
          anchor -1.4 -0.9 0
        }
        device [
          RotationalMotor {
            name "left_motor"
            maxVelocity 40
          }
        ]
        endPoint Solid {
          name "rl_wheel"
          translation -1.4 -0.9 0
          rotation 1 0 0 1.5708
          children [
            Shape {
              appearance PBRAppearance { 
                baseColor 0.15 0.15 0.15 
                roughness 0.6
              }
              geometry Cylinder { radius 0.3 height 0.25 }
            }
          ]
          boundingObject Cylinder { radius 0.3 height 0.25 }
          physics Physics {}
        }
      }

      HingeJoint {
        jointParameters HingeJointParameters {
          axis 0 1 0
          anchor -1.4 0.9 0
        }
        device [
          RotationalMotor {
            name "right_motor"
            maxVelocity 40
          }
        ]
        endPoint Solid {
          name "rr_wheel"
          translation -1.4 0.9 0
          rotation 1 0 0 1.5708
          children [
            Shape {
              appearance PBRAppearance { 
                baseColor 0.15 0.15 0.15 
                roughness 0.6
              }
              geometry Cylinder { radius 0.3 height 0.25 }
            }
          ]
          boundingObject Cylinder { radius 0.3 height 0.25 }
          physics Physics {}
        }
      }

      HingeJoint {
        jointParameters HingeJointParameters {
          axis 0 1 0
          anchor 1.4 -0.9 0
        }
        endPoint Solid {
          name "fl_wheel"
          translation 1.4 -0.9 0
          rotation 1 0 0 1.5708
          children [
            Shape {
              appearance PBRAppearance { 
                baseColor 0.15 0.15 0.15 
                roughness 0.6
              }
              geometry Cylinder { radius 0.3 height 0.25 }
            }
          ]
          boundingObject Cylinder { radius 0.3 height 0.25 }
