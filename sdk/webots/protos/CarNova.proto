# Airacer Car Model - Nova (新星黄闪电车) - Inherits TeslaModel3

EXTERNPROTO "https://raw.githubusercontent.com/cyberbotics/webots/R2025a/projects/vehicles/protos/tesla/TeslaModel3.proto"

PROTO CarNova [
  field SFString name "car_nova"
  field SFVec3f translation 0 0 0.4
  field SFRotation rotation 0 0 1 0
  field SFString controller "car"
]
{
  TeslaModel3 {
    translation IS translation
    rotation IS rotation
    controller IS controller
    name IS name
    color 1.0 0.8431 0.0
    sensorsSlotFront [
    Pose {
      translation 0 0 1.5
      children [
        Camera {
          translation 1.1 0 0.1
          rotation 0 1 0 0.4
          name "left_camera"
          fieldOfView 1.3
          width 640
          height 480
          far 100
        }
        Camera {
          translation 1.1 -5 0.1
          rotation 0 1 0 0
          name "right_camera"
          fieldOfView 1.3
          width 640
          height 480
          far 100
        }
      ]
    }
  ]
  }
}
